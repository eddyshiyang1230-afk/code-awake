<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CODE:AWAKE · AI漫剧工作流</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#06060c;--bg2:#0c0c16;--s:#12121e;--bd:#1e1e38;--g:#00ff88;--c:#00e5ff;--p:#7c3aed;--t:#d4d4d8;--dim:#71717a;--amber:#f59e0b}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--t);min-height:100vh;line-height:1.7}
.hero{padding:24px 32px;border-bottom:1px solid var(--bd);background:linear-gradient(135deg,#06060c,#0d0820,#060c08)}
.hero h1{font-size:24px;font-weight:900;letter-spacing:4px;background:linear-gradient(135deg,var(--g),var(--c),var(--p));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{font-size:11px;color:var(--dim);margin-top:4px;letter-spacing:1px}
.main{max-width:1200px;margin:0 auto;padding:24px 32px}
h2{font-size:18px;color:#fff;margin-bottom:12px}
h3{font-size:15px;color:var(--g);margin:18px 0 8px;border-left:3px solid var(--g);padding-left:10px}
h4{font-size:12px;color:var(--c);margin:12px 0 6px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;margin-bottom:20px}
.card{background:var(--s);border:1px solid var(--bd);border-radius:10px;overflow:hidden;cursor:pointer;transition:.2s}
.card:hover{border-color:var(--g);transform:translateY(-2px);box-shadow:0 4px 16px #00ff8815}
.card-bar{height:3px}
.card-body{padding:14px 16px}
.card-title{font-size:14px;font-weight:700;color:#fff}
.card-id{font-size:9px;color:var(--dim);background:var(--bg);padding:1px 5px;border-radius:3px;margin-left:4px}
.card-logline{font-size:10px;color:var(--amber);font-style:italic;margin:4px 0}
.tags{display:flex;gap:3px;flex-wrap:wrap;margin:4px 0}
.tag{font-size:9px;padding:1px 5px;border-radius:99px;border:1px solid}
.prog-wrap{margin-top:6px;display:flex;align-items:center;gap:6px}
.prog-bar{flex:1;height:3px;background:var(--bd);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px}
.prog-pct{font-size:10px;font-weight:700}
#detail{display:none}
.back-btn{background:none;border:1px solid var(--bd);color:var(--dim);padding:4px 10px;border-radius:4px;cursor:pointer;font-size:11px;margin-bottom:10px}
.back-btn:hover{color:var(--g);border-color:var(--g)}
.tabs{display:flex;gap:4px;flex-wrap:wrap;margin:10px 0;border-bottom:1px solid var(--bd);padding-bottom:6px}
.tab{background:var(--bg2);border:1px solid var(--bd);color:var(--dim);padding:4px 10px;border-radius:4px;cursor:pointer;font-size:11px}
.tab:hover,.tab.active{color:var(--g);border-color:var(--g);background:var(--s)}
.phase{display:none}.phase.active{display:block}
.kv{display:flex;gap:8px;margin:3px 0;font-size:11px;flex-wrap:wrap}
.kv b{color:var(--dim);min-width:60px;flex-shrink:0}
.amber{color:var(--amber)}
.prompt-wrap{position:relative;margin:6px 0}
.prompt-box{background:#0a1a0f;border:1px solid #00ff8830;border-radius:6px;padding:8px 44px 8px 10px;font-size:10px;color:var(--g);font-family:monospace;line-height:1.5;word-break:break-word;white-space:pre-wrap}
.prompt-box.cam{border-color:#7c3aed40;color:var(--p);background:#0d0a1a}
.prompt-box.scene{border-color:#00e5ff30;color:var(--c);background:#0a0f1a}
.copy-btn{position:absolute;top:4px;right:4px;background:var(--g);color:#000;border:none;padding:2px 8px;border-radius:3px;font-size:9px;font-weight:700;cursor:pointer;opacity:.7}
.copy-btn:hover{opacity:1}.copy-btn.ok{background:var(--amber)}
.style-banner{background:#00ff8808;border:1px solid #00ff8820;border-radius:6px;padding:8px 12px;margin:8px 0;font-size:10px;font-family:monospace;color:var(--g)}
.char-grid,.loc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:8px;margin:6px 0}
.char-card,.loc-card{background:var(--bg2);border:1px solid var(--bd);border-radius:6px;padding:10px}
.char-name,.loc-name{font-weight:700;color:#fff;font-size:13px}
.char-role{font-size:9px;color:var(--dim);margin:2px 0 4px}
.char-desc{font-size:10px;margin:2px 0}
.loc-desc{font-size:10px;color:var(--dim);margin:3px 0}
.color-dot{display:inline-block;width:18px;height:18px;border-radius:50%;border:2px solid var(--bd);vertical-align:middle;margin-right:2px}
.table-wrap{overflow-x:auto;margin:6px 0}
table{width:100%;border-collapse:collapse;font-size:10px}
th,td{padding:5px 7px;border:1px solid var(--bd);text-align:left}
th{background:var(--bg2);color:var(--g);font-weight:600;font-size:9px}
.ep-block{background:var(--s);border:1px solid var(--bd);border-radius:8px;padding:12px;margin-bottom:10px}
.hook-box{background:#f59e0b08;border-left:3px solid var(--amber);padding:5px 8px;margin:4px 0;font-size:10px;border-radius:0 4px 4px 0}
.hook-tag{font-size:9px;font-weight:700;padding:1px 4px;border-radius:2px;margin-right:4px;color:#000}
.hook-tag.open{background:var(--amber)}.hook-tag.end{background:#ef4444;color:#fff}
.scene-card{background:var(--bg);border:1px solid var(--bd);border-radius:5px;padding:8px;margin:4px 0}
.scene-title{font-size:11px;font-weight:700;color:var(--c)}
.scene-desc{font-size:10px;color:var(--dim);margin:2px 0}
.dial{font-size:10px;margin:2px 0;padding-left:6px;border-left:2px solid var(--bd)}
.panel-card{background:var(--bg);border:1px solid var(--bd);border-radius:6px;padding:10px;margin:6px 0}
.panel-head{font-size:11px;font-weight:700;color:var(--c);margin-bottom:3px}
.panel-meta{font-size:9px;color:var(--dim);margin:1px 0}
ul{padding-left:16px;font-size:11px}li{margin:2px 0}
.footer{text-align:center;padding:16px;color:#2a2a3a;font-size:9px;letter-spacing:2px;border-top:1px solid var(--bd);margin-top:24px}
@media(max-width:768px){.main{padding:12px}.grid{grid-template-columns:1fr}}
</style></head><body>

function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=String(s);return d.innerHTML}
function pb(t,c){if(!t)return'';return'<div class="prompt-wrap"><div class="prompt-box '+c+'">'+esc(t)+'</div><button class="copy-btn" onclick="cp(this)">COPY</button></div>'}
function cp(b){const t=b.previousElementSibling.textContent.trim();navigator.clipboard.writeText(t).then(()=>{b.textContent='✓OK';b.classList.add('ok');setTimeout(()=>{b.textContent='COPY';b.classList.remove('ok')},1200)}).catch(()=>{const a=document.createElement('textarea');a.value=t;document.body.appendChild(a);a.select();document.execCommand('copy');document.body.removeChild(a);b.textContent='✓OK';b.classList.add('ok');setTimeout(()=>{b.textContent='COPY';b.classList.remove('ok')},1200)})}

function dash(){
  let h='<h2>📦 项目总览 ('+P.length+')</h2><div class="grid">';
  P.forEach((p,i)=>{
    const ip=p.ip_design||{},accent=(ip.color_identity||['#7c3aed'])[0],cp=(p.completed_phases||[]).length;
    const tags=(ip.genre_tags||[]).slice(0,4).map(t=>'<span class="tag" style="color:'+accent+';border-color:'+accent+'66">'+esc(t)+'</span>').join('');
    h+='<div class="card" onclick="show('+i+')">'
      +'<div class="card-bar" style="background:'+accent+'"></div>'
      +'<div class="card-body">'
      +'<div class="card-title">'+esc(p.project_name)+' <span class="card-id">#'+esc(p.project_id)+'</span></div>'
      +(ip.logline?'<div class="card-logline">「'+esc(ip.logline)+'」</div>':'')
      +'<div class="tags">'+tags+'</div>'
      +'<div class="prog-wrap"><div class="prog-bar"><div class="prog-fill" style="width:'+(cp*100/9|0)+'%;background:'+accent+'"></div></div><span class="prog-pct" style="color:'+accent+'">'+cp+'/9</span></div>'
      +'</div></div>';
  });
  h+='</div>';
  document.getElementById('dashboard').innerHTML=h;
}

function show(i){
  const p=P[i],ip=p.ip_design||{},accent=(ip.color_identity||['#7c3aed'])[0];
  document.getElementById('dashboard').style.display='none';
  const PH=[{k:'world',l:'🌍世界观'},{k:'ip',l:'💎IP'},{k:'chars',l:'👤角色'},{k:'plot',l:'📖剧情'},{k:'script',l:'✍️剧本'},{k:'sb',l:'🎬分镜'}];
  let tabs=PH.map((t,j)=>'<button class="tab'+(j===0?' active':'')+'" onclick="sw(this,''+t.k+'')">' +t.l+'</button>').join('');
  let ph='';

  // World
  const wb=p.worldbuilding||{},locs=wb.locations||[];
  let lh='';locs.forEach(l=>{if(typeof l==='object'){lh+='<div class="loc-card"><div class="loc-name">'+esc(l.name)+'</div><div class="loc-desc">'+esc(l.description)+'</div>'+(l.mj_prompt?pb(l.mj_prompt,'scene'):'')+'</div>'}});
  ph+='<div class="phase active" id="ph-world"><h3>🌍 世界观设定</h3>'
    +'<div class="kv"><b>时代</b><span>'+esc(wb.era)+'</span></div>'
    +'<div class="kv"><b>核心冲突</b><span>'+esc(wb.core_conflict)+'</span></div>'
    +'<div class="kv"><b>力量体系</b><span>'+esc(wb.power_system)+'</span></div>'
    +'<div class="style-banner">🎨 风格前缀: '+esc(p.style_prefix)+'</div>'
    +'<h4>📍场景 ('+locs.length+')</h4><div class="loc-grid">'+lh+'</div></div>';

  // IP
  const sell=(ip.core_selling_points||[]).map(s=>'<li>'+esc(s)+'</li>').join('');
  const cols=(ip.color_identity||[]).map(c=>'<span class="color-dot" style="background:'+c+'" title="'+c+'"></span>').join('');
  ph+='<div class="phase" id="ph-ip"><h3>💎 IP孵化</h3>'
    +'<div class="kv"><b>Logline</b><span class="amber" style="font-size:12px">'+esc(ip.logline)+'</span></div>'
    +'<div class="kv"><b>色板</b>'+cols+'</div>'
    +'<div class="kv"><b>视觉锚点</b><span>'+esc(ip.visual_anchor)+'</span></div>'
    +'<div class="kv"><b>竞争优势</b><span>'+esc(ip.competitive_advantage)+'</span></div>'
    +(sell?'<h4>核心卖点</h4><ul>'+sell+'</ul>':'')+'</div>';

  // Chars
  const ch=p.characters||{},anc=p.character_anchors||{};
  let chh='';
  [['protagonists','🔴主角'],['supporting','🔵配角'],['antagonists','⚫反派']].forEach(([g,lb])=>{
    const ls=ch[g]||[];if(!ls.length)return;
    chh+='<h4>'+lb+' ('+ls.length+')</h4><div class="char-grid">';
    ls.forEach(c=>{
      const a=anc[c.name]||'',kw=(c.mj_prompt_keywords||[]);
      const kwStr=typeof kw==='string'?kw:kw.join(', ');
      chh+='<div class="char-card"><div class="char-name">'+esc(c.name)+'</div>'
        +'<div class="char-role">'+esc(c.role)+' · '+esc(c.age)+' · '+esc(c.gender)+'</div>'
        +'<div class="char-desc">'+esc(c.appearance)+'</div>'
        +'<div class="char-desc">🎭 '+esc(c.personality)+'</div>'
        +(a?'<h4>🔒 Master Prompt</h4>'+pb(a,''):'')
        +(kwStr?pb(kwStr,''):'')
        +'</div>';
    });
    chh+='</div>';
  });
  ph+='<div class="phase" id="ph-chars"><h3>👤 角色与场景设计</h3><div class="style-banner">🎨 风格: '+esc(p.style_prefix)+'</div>'+chh+'</div>';

  // Plot
  const sb=p.story_bible||{},ol=sb.episode_outlines||[];
  let orows='';ol.forEach(o=>{orows+='<tr><td>'+esc(o.ep_index)+'</td><td style="color:#fff">'+esc(o.title)+'</td><td>'+esc(o.synopsis)+'</td><td class="amber">'+esc(o.cliffhanger)+'</td></tr>'});
  const thr=(sb.plot_threads||[]).map(t=>'<li>'+esc(t)+'</li>').join('');
  const fore=(sb.foreshadowing||[]).map(f=>'<li>'+esc(typeof f==='object'?(f.description||f.hint||JSON.stringify(f)):f)+'</li>').join('');
  ph+='<div class="phase" id="ph-plot"><h3>📖 剧情设计</h3>'
    +'<div class="kv"><b>整体弧线</b><span>'+esc(sb.overall_arc)+'</span></div>'
    +'<div class="kv"><b>主题</b><span>'+esc(sb.theme)+'</span></div>'
    +(thr?'<h4>剧情线</h4><ul>'+thr+'</ul>':'')
    +(fore?'<h4>伏笔</h4><ul>'+fore+'</ul>':'')
    +'<h4>分集大纲 ('+ol.length+'集)</h4>'
    +'<div class="table-wrap"><table><thead><tr><th>#</th><th>标题</th><th>简介</th><th>悬念钩子</th></tr></thead><tbody>'+orows+'</tbody></table></div></div>';

  // Script
  const eds=p.episode_details||{};let eph='';
  Object.keys(eds).sort((a,b)=>+a-+b).forEach(ek=>{
    const ep=eds[ek];let sh='';
    (ep.scenes||[]).forEach((sc,si)=>{
      let dh='';(sc.dialogue||sc.dialogues||[]).forEach(d=>{
        if(typeof d==='object')dh+='<div class="dial"><b>'+esc(d.character)+'</b>: '+esc(d.line)+'</div>';
        else dh+='<div class="dial">'+esc(d)+'</div>';
      });
      sh+='<div class="scene-card"><div class="scene-title">场景'+(si+1)+': '+esc(sc.location)+' — '+esc(sc.mood)+'</div><div class="scene-desc">'+esc(sc.description)+'</div>'+dh+'</div>';
    });
    eph+='<div class="ep-block"><h4>📝 第'+ek+'集: '+esc(ep.title)+'</h4>'
      +'<div class="hook-box"><span class="hook-tag open">开场HOOK</span> '+esc(ep.opening_hook)+'</div>'
      +sh
      +'<div class="hook-box"><span class="hook-tag end">结尾钩子</span> '+esc(ep.ending_beat)+'</div></div>';
  });
  ph+='<div class="phase" id="ph-script"><h3>✍️ 分集剧本</h3>'+(eph||'<p style="color:var(--dim)">暂无</p>')+'</div>';

  // Storyboard
  const sbs=p.storyboards||{};let sbh='';
  Object.keys(sbs).sort((a,b)=>+a-+b).forEach(sk=>{
    const bd=sbs[sk];let pi=0,psh='';
    (bd.scenes||[]).forEach((sc,si)=>{
      psh+='<h4>场景'+(si+1)+': '+esc(sc.scene_title||sc.location)+'</h4>';
      (sc.panels||[]).forEach(pn=>{
        pi++;const mj=pn.mj_prompt||'',cam=pn.camera||pn.camera_angle||'',mot=pn.motion||pn.camera_motion||'';
        const info=[pn.shot_type,cam,mot].filter(Boolean).join(' · ');
        psh+='<div class="panel-card"><div class="panel-head">Panel '+pi+' · '+esc(info)+'</div>'
          +(pn.subject?'<div class="panel-meta">👤 '+esc(pn.subject)+'</div>':'')
          +(pn.action?'<div class="panel-meta">🎬 '+esc(pn.action)+'</div>':'')
          +(pn.dialogue?'<div class="panel-meta">💬 '+esc(pn.dialogue)+'</div>':'')
          +(mj?pb(mj,''):'')
          +'</div>';
      });
    });
    sbh+='<div class="ep-block"><h4>🎬 第'+sk+'集分镜: '+esc(bd.ep_title)+' ('+pi+' panels)</h4>'+psh+'</div>';
  });
  ph+='<div class="phase" id="ph-sb"><h3>🎬 分镜 · 可复制Prompt</h3><div class="style-banner">🎨 风格前缀已嵌入每个Prompt: '+esc(p.style_prefix)+'</div>'+(sbh||'<p style="color:var(--dim)">暂无</p>')+'</div>';

  document.getElementById('detail').innerHTML='<button class="back-btn" onclick="back()">← 返回</button><h2 style="color:'+accent+'">'+esc(p.project_name)+'</h2><div class="tabs">'+tabs+'</div>'+ph;
  document.getElementById('detail').style.display='block';
  window.scrollTo(0,0);
}
